services:
  # ── Backend API (Express + MongoDB) ──
  - type: web
    name: rabina-closet-server
    runtime: node
    plan: free
    region: oregon
    branch: main
    buildCommand: "cd server && npm install"
    startCommand: "cd server && node src/server.js"
    autoDeploy: true
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false          # set manually in Render dashboard
      - key: CLIENT_ORIGIN
        sync: false
      - key: ADMIN_USER
        sync: false
      - key: ADMIN_PASS
        sync: false
      - key: ADMIN_API_KEY
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false

  # ── Frontend (Vite SPA — static site) ──
  - type: web
    name: rabina-closet-client
    runtime: static
    plan: free
    region: oregon
    branch: main
    buildCommand: "cd client && npm install && npm run build"
    staticPublishPath: "client/dist"
    autoDeploy: true
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
    routes:
      # SPA fallback: serve index.html for all non-file routes
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false          # set to the server URL in Render dashboard
      - key: VITE_WHATSAPP_BASE
        sync: false
